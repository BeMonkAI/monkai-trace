components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Recommended authentication scheme. Send the tracer token as
        `Authorization: Bearer tk_<hex>`. RFC 6750 — works out of the
        box with `curl`, `fetch`, generated clients, and most API
        gateways.
    tracerTokenHeader:
      type: apiKey
      in: header
      name: tracer_token
      description: |
        Legacy authentication scheme, still supported. Send the tracer
        token in the `tracer_token` HTTP header. Both schemes accept
        the same `tk_<hex>` token and can be used interchangeably.
        New integrations should prefer `bearerAuth`.

  parameters:
    RequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
        pattern: '^[\x21-\x7E][\x20-\x7E]{0,127}$'
      description: |
        Optional client-supplied request correlation ID. If provided,
        the server preserves the value in the response `X-Request-ID`
        header (round-trip). If omitted, the server generates a UUIDv4.
        Useful for distributed traces and support correlation.

  headers:
    XRequestId:
      schema:
        type: string
      description: |
        Request correlation ID. Mirrors the value sent in the request
        `X-Request-ID` header when present, otherwise a server-generated
        UUIDv4. Always emitted on every response (200, 4xx, 5xx). Quote
        this value when reporting issues.

  responses:
    BadRequest:
      description: Bad Request — required field missing or invalid payload
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized — invalid or missing tracer token
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden — token does not have access to the resource
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal Server Error
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # ---------- Common ----------
    Error:
      type: object
      description: |
        Structured error envelope (Phase 2). Every 4xx/5xx response
        from `/v1/` carries this shape. Some endpoints add extra context
        fields (e.g. `similar_namespaces`, `unregistered_namespaces`,
        `details`, `issues`) alongside the envelope — those are
        operation-specific and documented per response, but `error.code`
        is always populated and is the recommended branching key.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: |
                Machine-readable error code. Stable across versions —
                clients should branch on this rather than substring-match
                `message`. New codes may be added; clients should treat
                unknown codes as the generic family code (the same first
                segment, e.g. `bad_request` for any 4xx the client
                doesn't recognise).
              enum:
                - bad_request
                - missing_field
                - invalid_payload
                - namespace_taken
                - namespace_too_similar
                - unauthorized
                - missing_token
                - invalid_token
                - token_expired
                - token_inactive
                - forbidden
                - not_found
                - internal_error
                - encryption_error
                - anonymization_error
              example: missing_token
            message:
              type: string
              description: Human-readable message. Subject to wording
                changes — do not pattern-match.
              example: "Missing tracer token (use `tracer_token` header or `Authorization: Bearer tk_...`)"
            request_id:
              type: string
              description: |
                Mirror of the `X-Request-ID` response header. Quote this
                value in support tickets so we can pinpoint the exact
                server log entry.
              example: "8c5d96f1-9e47-4c01-bb1e-8b5a7a2a1234"
      additionalProperties: true
      examples:
        - error:
            code: missing_token
            message: "Missing tracer token (use `tracer_token` header or `Authorization: Bearer tk_...`)"
            request_id: "8c5d96f1-9e47-4c01-bb1e-8b5a7a2a1234"


    # ---------- Sessions ----------
    SessionCreateRequest:
      type: object
      required: [namespace]
      properties:
        namespace:
          type: string
          description: Logical namespace the session belongs to (e.g. agent name).
          example: my-agent
        user_id:
          type: string
          description: External user identifier (used in `session_id` generation).
          example: "5521999998888"
        inactivity_timeout:
          type: integer
          minimum: 1
          default: 120
          description: Seconds of inactivity before the session expires.
        metadata:
          type: object
          additionalProperties: true
          description: Free-form metadata stored with the session.

    Session:
      type: object
      required: [session_id, namespace, created_at]
      properties:
        session_id:
          type: string
          example: my-namespace-user123-20251210123456
        namespace:
          type: string
        user_id:
          type: string
        inactivity_timeout:
          type: integer
        created_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    SessionGetOrCreateRequest:
      type: object
      required: [namespace, user_id]
      properties:
        namespace:
          type: string
        user_id:
          type: string
        inactivity_timeout:
          type: integer
          minimum: 1
          default: 120
        force_new:
          type: boolean
          default: false
          description: Force a new session even if a recent active session exists.

    SessionGetOrCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Session"
        - type: object
          properties:
            reused:
              type: boolean
              description: True if an existing session was returned, false if a new one was created.

    # ---------- Traces ----------
    LlmTraceRequest:
      type: object
      required: [session_id]
      properties:
        session_id:
          type: string
        model:
          type: string
          example: gpt-4
        provider:
          type: string
          example: openai
        input:
          type: object
          description: |
            Input payload. Common shape: `{ "messages": [...] }`.
          additionalProperties: true
        output:
          type: object
          description: |
            Output payload. Common shape: `{ "content": "...", "usage": {...} }`.
          additionalProperties: true
        latency_ms:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        external_user_id:
          type: string
          description: Optional external user identifier (phone, email, customer ID).
          example: "5521999998888"
        external_user_name:
          type: string
          description: Optional human-readable user display name.
          example: "João Silva"
        external_user_channel:
          type: string
          description: Origin channel for the user.
          enum: [whatsapp, web, telegram, slack, email, teams, sms, voice, other]
          example: whatsapp

    LlmTraceResponse:
      type: object
      properties:
        success:
          type: boolean
        trace_type:
          type: string
          const: llm_call
        tokens:
          type: object
          properties:
            input:
              type: integer
            output:
              type: integer

    ToolTraceRequest:
      type: object
      required: [session_id, tool_name]
      properties:
        session_id:
          type: string
        tool_name:
          type: string
        arguments:
          type: object
          additionalProperties: true
        result: {}
        latency_ms:
          type: integer
          minimum: 0
        agent:
          type: string
          description: Agent that called the tool.
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        external_user_id:
          type: string
          description: Optional external user identifier (phone, email, customer ID).
          example: "5521999998888"
        external_user_name:
          type: string
          description: Optional human-readable user display name.
          example: "João Silva"
        external_user_channel:
          type: string
          description: Origin channel for the user.
          enum: [whatsapp, web, telegram, slack, email, teams, sms, voice, other]
          example: whatsapp

    ToolTraceResponse:
      type: object
      properties:
        success:
          type: boolean
        trace_type:
          type: string
          const: tool_call
        tool_name:
          type: string

    HandoffTraceRequest:
      type: object
      required: [session_id, from_agent, to_agent]
      properties:
        session_id:
          type: string
        from_agent:
          type: string
        to_agent:
          type: string
        reason:
          type: string
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        external_user_id:
          type: string
          description: Optional external user identifier (phone, email, customer ID).
          example: "5521999998888"
        external_user_name:
          type: string
          description: Optional human-readable user display name.
          example: "João Silva"
        external_user_channel:
          type: string
          description: Origin channel for the user.
          enum: [whatsapp, web, telegram, slack, email, teams, sms, voice, other]
          example: whatsapp

    HandoffTraceResponse:
      type: object
      properties:
        success:
          type: boolean
        trace_type:
          type: string
          const: handoff
        from:
          type: string
        to:
          type: string

    LogTraceRequest:
      type: object
      required: [message]
      properties:
        session_id:
          type: string
          description: Provide either `session_id` or `namespace`.
        namespace:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error]
          default: info
        message:
          type: string
        resource_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

    LogTraceResponse:
      type: object
      properties:
        success:
          type: boolean
        trace_type:
          type: string
          const: log

    # ---------- Records ----------
    Message:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: object
              additionalProperties: true
            - type: "null"
        sender:
          type: string
        tool_calls:
          type: array
          items:
            type: object
            additionalProperties: true
        tool_call_id:
          type: string
        tool_name:
          type: string
        is_internal_tool:
          type: boolean
        internal_tool_type:
          type: string
          enum: [web_search_call, file_search_call, code_interpreter_call]

    MessageList:
      type: array
      description: Ordered list of messages (turn or session segment).
      items:
        $ref: "#/components/schemas/Message"

    MessageDict:
      type: object
      description: Free-form message-shaped payload (escape hatch for legacy clients).
      additionalProperties: true

    Transfer:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          description: Source agent.
        to:
          type: string
          description: Target agent.
        reason:
          type: string
        timestamp:
          type: string

    ConversationRecord:
      type: object
      required: [namespace, agent, msg]
      properties:
        namespace:
          type: string
        agent:
          type: string
        session_id:
          type: string
        msg:
          oneOf:
            - $ref: "#/components/schemas/Message"
            - $ref: "#/components/schemas/MessageList"
            - $ref: "#/components/schemas/MessageDict"
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        process_tokens:
          type: integer
          minimum: 0
        memory_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/Transfer"
        inserted_at:
          type: string
          format: date-time
        user_id:
          type: string
        user_whatsapp:
          type: string
        wam_id:
          type: string
        replied_whatsapp:
          type: string
        attachments:
          type: array
          items: {}
        source:
          type: string
          description: Source tool (claude-code, cline, copilot, openai-agents, langchain, ...).
        model:
          type: string
        external_user_id:
          type: string
          description: Optional external user identifier (phone, email, customer ID).
          example: "5521999998888"
        external_user_name:
          type: string
          description: Optional human-readable user display name.
          example: "João Silva"
        external_user_channel:
          type: string
          description: Origin channel for the user.
          enum: [whatsapp, web, telegram, slack, email, teams, sms, voice, other]
          example: whatsapp

    RecordsUploadRequest:
      type: object
      required: [records]
      properties:
        records:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ConversationRecord"

    RecordsUploadResponse:
      type: object
      properties:
        inserted_count:
          type: integer
          minimum: 0
        dropped_count:
          type: integer
          minimum: 0
          description: Records dropped server-side (e.g., duplicates).
        details:
          type: object
          additionalProperties: true

    # ---------- Logs ----------
    LogEntry:
      type: object
      required: [namespace, level, message]
      properties:
        namespace:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error]
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        resource_id:
          type: string
        custom_object:
          type: object
          additionalProperties: true

    LogsUploadRequest:
      type: object
      required: [logs]
      properties:
        logs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LogEntry"

    LogsUploadResponse:
      type: object
      additionalProperties: true
      properties:
        inserted_count:
          type: integer
          minimum: 0

    # ---------- Query ----------
    RecordQueryFilters:
      type: object
      properties:
        agent:
          type: string
        session_id:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        offset:
          type: integer
          minimum: 0
          default: 0

    RecordQueryRequest:
      type: object
      required: [namespace, query]
      properties:
        namespace:
          type: string
        query:
          $ref: "#/components/schemas/RecordQueryFilters"

    RecordQueryResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/ConversationRecord"
        count:
          type: integer
          minimum: 0

    LogQueryRequest:
      type: object
      required: [namespace]
      properties:
        namespace:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error]
        resource_id:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        offset:
          type: integer
          minimum: 0
          default: 0

    LogQueryResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        count:
          type: integer
          minimum: 0

    # ---------- Export ----------
    RecordExportRequest:
      type: object
      required: [namespace]
      properties:
        namespace:
          type: string
        agent:
          type: string
        session_id:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        format:
          type: string
          enum: [json, csv]
          default: json

    RecordExportResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/ConversationRecord"

    LogExportRequest:
      type: object
      required: [namespace]
      properties:
        namespace:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error]
        resource_id:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        format:
          type: string
          enum: [json, csv]
          default: json

    LogExportResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
