# DEPRECATED: PyPI publish is now done manually via `python3 -m build && python3 -m twine upload dist/*`
# See skill /monkai-trace for the manual publish process.
name: Version Check

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is on PyPI
        run: |
          VERSION=$(awk '/^\[project\]/{found=1} found && /^version *= *"/{gsub(/.*version *= *"|".*/, ""); print; exit}' pyproject.toml)
          echo "Version: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/monkai-trace/$VERSION/json)

          if [ "$HTTP_STATUS" = "404" ]; then
            echo "⚠️ Version $VERSION NOT on PyPI — run manual publish: python3 -m build && python3 -m twine upload dist/*"
          else
            echo "✅ Version $VERSION already on PyPI"
          fi
