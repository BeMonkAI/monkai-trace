name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -x \
            --ignore=tests/test_openai_agents_e2e.py \
            --ignore=tests/test_service_logging_e2e.py \
            --ignore=tests/test_langchain_integration.py \
            --ignore=tests/test_monkai_agent_integration.py \
            --ignore=tests/test_openai_agents_integration.py \
            --ignore=tests/test_logging_integration.py \
            -q

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
