name: "✅ CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: black --check .
        continue-on-error: true
      - run: ruff check .
        continue-on-error: true
      - run: mypy monkai_trace --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest tests/ -v --cov=monkai_trace --cov-report=term-missing -x \
            --ignore=tests/test_openai_agents_e2e.py \
            --ignore=tests/test_service_logging_e2e.py \
            --ignore=tests/test_langchain_integration.py \
            --ignore=tests/test_monkai_agent_integration.py \
            --ignore=tests/test_openai_agents_integration.py \
            --ignore=tests/test_logging_integration.py

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
