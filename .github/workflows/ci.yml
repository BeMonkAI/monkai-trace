name: "✅ CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"

      # Advisory (não bloqueia)
      - name: Black
        run: black --check .
        continue-on-error: true
      - name: isort
        run: isort --check-only monkai_trace
        continue-on-error: true

      # Bloqueante
      - name: Ruff
        run: ruff check monkai_trace --output-format=github
      - name: mypy
        run: mypy monkai_trace --ignore-missing-imports

  test:
    name: 🧪 Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"

      - name: Test imports
        run: python -c "import monkai_trace; print(f'monkai-trace v{monkai_trace.__version__}')"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=monkai_trace --cov-report=term-missing -x \
            --ignore=tests/test_openai_agents_e2e.py \
            --ignore=tests/test_service_logging_e2e.py \
            --ignore=tests/test_langchain_integration.py \
            --ignore=tests/test_monkai_agent_integration.py \
            --ignore=tests/test_openai_agents_integration.py \
            --ignore=tests/test_logging_integration.py

  build:
    name: 🔨 Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip install -e . && pip-audit
        continue-on-error: true
